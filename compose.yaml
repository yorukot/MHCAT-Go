services:
  mhcat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MHCAT_ENV
      - MHCAT_DISCORD_TOKEN
      - MHCAT_REPORT_WEBHOOK_URL
      - MHCAT_MONGODB_URI
      - MHCAT_MONGODB_DATABASE
      - MHCAT_DISCORD_SHARD_COUNT
      - MHCAT_DISCORD_SHARD_SPAWN_DELAY
      - MHCAT_DISCORD_SHARD_RESTART_DELAY
      - MHCAT_DISCORD_SHARD_RESTART_MAX_DELAY
      - MHCAT_DISCORD_SHARD_RESTART_RESET_AFTER
      - MHCAT_DISCORD_SHARD_STOP_TIMEOUT
      - MHCAT_SCHEDULER_LEASE_OWNER
      - MHCAT_LEGACY_WELCOME_SPECIAL_GUILD_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_BOT_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_CHANNEL_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_CHAT_CHANNEL_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_HELP_CHANNEL_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_BUG_CHANNEL_ID
      - MHCAT_LEGACY_WELCOME_SPECIAL_SUPPORT_CHANNEL_ID
    stop_grace_period: 45s
    networks:
      - mhcat-net

networks:
  mhcat-net:
    external: true
