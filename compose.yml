services:
  mongodb:
    image: mongo:7.0
    container_name: mhcat-refactor-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mhcat-refactor-mongodb:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mhcat-refactor-mongodb:
